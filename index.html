<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio Viva Vista Ferraz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SORTEIO DE VAGAS</h1>
    <p class="subtitle">VIVA VISTA FERRAZ </p>

    <button id="btnSorteio" onclick="realizarSorteio()">Realizar Sorteio Agora</button>
    
    <!-- Botão para baixar o CSV (começa escondido) -->
    <button id="btnBaixar" onclick="baixarCSV()" style="display: none; background-color: #3498db; margin-top: -15px;">Baixar Arquivo CSV</button>

    <h2 class="titulo-tabela" style="display: none;">Vagas PCD</h2>
    <table id="tabelaResultadoPCD">
        <thead>
            <tr>
                <th>Vaga PCD</th>
                <th>Apartamento Sorteado</th>
            </tr>
        </thead>
        <tbody id="corpoTabelaPCD">
            <!-- O resultado PCD vai aparecer aqui dinamicamente -->
        </tbody>
    </table>

    <h2 class="titulo-tabela" style="display: none; margin-top: 30px;">Vagas Gerais</h2>
    <table id="tabelaResultado">
        <thead>
            <tr>
                <th>Vaga</th>
                <th>Apartamento Sorteado</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <!-- O resultado geral vai aparecer aqui dinamicamente -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
