<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio Viva Vista Ferraz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="img/logo.jpeg" alt="Logo Viva Vista" class="logo-condominio">
    
    <h1>SORTEIO DE VAGAS</h1>
    <p class="subtitle">
        VIVA VISTA FERRAZ<br>
        <strong>SORTEIO (VIGENCIA DE 17 DE AGOSTO DE 2026 A 16 DE AGOSTO DE 2027)</strong>
    </p>

    <button id="btnSorteio" onclick="realizarSorteio()">Realizar Sorteio Agora</button>
    
    <!-- Botão atualizado para Excel -->
    <button id="btnBaixar" onclick="baixarExcel()" style="display: none;">Baixar Arquivo Excel</button>

    <h2 class="titulo-tabela" style="display: none;">Vagas PCD</h2>
    <table id="tabelaResultadoPCD">
        <thead>
            <tr>
                <th>Vaga PCD</th>
                <th>Apartamento Sorteado</th>
            </tr>
        </thead>
        <tbody id="corpoTabelaPCD">
            <!-- O resultado PCD vai aparecer aqui dinamicamente -->
        </tbody>
    </table>

    <h2 class="titulo-tabela" style="display: none; margin-top: 30px;">Vagas Gerais</h2>
    <table id="tabelaResultado">
        <thead>
            <tr>
                <th>Vaga</th>
                <th>Apartamento Sorteado</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <!-- O resultado geral vai aparecer aqui dinamicamente -->
        </tbody>
    </table>

    <!-- Biblioteca SheetJS para criar o arquivo Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
